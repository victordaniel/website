<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Daniel | Under Construction</title>
    <meta name="description" content="Victor Daniel's professional website is undergoing exciting upgrades. Check back soon!">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --secondary: #06b6d4;
            --secondary-glow: rgba(6, 182, 212, 0.4);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glowing Background Blobs */
        .glowing-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            opacity: 0.5;
            animation: float-blobs 12s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            top: -10%;
            left: -10%;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--secondary-glow) 0%, transparent 70%);
            bottom: -15%;
            right: -10%;
            animation-delay: -6s;
        }

        @keyframes float-blobs {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(50px, 30px) scale(1.1);
            }
        }

        /* Container & Glassmorphism Card */
        .container {
            width: 90%;
            max-width: 650px;
            z-index: 10;
            position: relative;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3.5rem 2.5rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transform: translateY(0);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: card-appear 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes card-appear {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Branding/Logo */
        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 2.5rem;
            display: inline-block;
        }

        .logo span {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Under Construction Graphic */
        .graphic-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
        }

        .spinner-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top-color: var(--secondary);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        .spinner-ring-inner {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 3px solid transparent;
            border-left-color: var(--primary);
            border-right-color: var(--secondary);
            border-radius: 50%;
            animation: spin-reverse 2s linear infinite;
        }

        .graphic-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            color: var(--text-main);
            animation: pulse-icon 2s infinite ease-in-out;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes pulse-icon {
            0%, 100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #d1d5db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Sleek Status / Progress Indicator */
        .progress-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 2.5rem;
            text-align: left;
        }

        .progress-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--secondary);
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 65%;
            background: linear-gradient(to right, var(--secondary), var(--primary));
            border-radius: 10px;
            position: relative;
            animation: pulse-progress 2s infinite ease-in-out;
        }

        @keyframes pulse-progress {
            0%, 100% { opacity: 0.95; }
            50% { opacity: 0.7; }
        }

        /* Connect Section */
        .connect-title {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            font-size: 1.2rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .social-btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        /* Media Queries */
        @media (max-width: 600px) {
            .card {
                padding: 2.5rem 1.5rem;
            }
            h1 {
                font-size: 2rem;
            }
            .subtitle {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background Blobs -->
    <div class="glowing-blob blob-1"></div>
    <div class="glowing-blob blob-2"></div>

    <div class="container">
        <div class="card">
            <!-- Branding -->
            <div class="logo">
                Victor<span>Daniel</span>
            </div>

            <!-- Graphic -->
            <div class="graphic-container">
                <div class="spinner-ring"></div>
                <div class="spinner-ring-inner"></div>
                <div class="graphic-icon">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                </div>
            </div>

            <!-- Main Heading -->
            <h1>Upgrading the Experience</h1>
            
            <!-- Description -->
            <p class="subtitle">
                My professional portfolio is currently undergoing exciting upgrades to better showcase my latest talks, AI integrations, and developer innovations. Check back soon!
            </p>

            <!-- Progress Box -->
            <div class="progress-box">
                <div class="progress-label">
                    <span>Renovations in Progress</span>
                    <span>65%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill"></div>
                </div>
            </div>

            <!-- Connect -->
            <div class="connect-title">Stay Connected</div>
            <div class="social-links">
                <a href="https://github.com/victordaniel" target="_blank" class="social-btn" title="GitHub" aria-label="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
                <a href="mailto:victordaniel.gera@gmail.com" class="social-btn" title="Email" aria-label="Email">
                    <i class="fa-solid fa-envelope"></i>
                </a>
                <a href="https://www.youtube.com/embed/SacKhxobfUg" target="_blank" class="social-btn" title="YouTube Profile" aria-label="YouTube">
                    <i class="fa-brands fa-youtube"></i>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
